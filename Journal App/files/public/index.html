<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Journal</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════ */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Backgrounds */
      --bg:             #FDFCFA;
      --sidebar-bg:     #FAFAF7;
      --sidebar-border: #EDEAE3;
      --card-hover:     #F3F1EB;

      /* Text */
      --text:           #1A1A1A;
      --text-mid:       #3D3D3D;
      --text-muted:     #7A7770;
      --text-faint:     #A8A49C;

      /* Interactive */
      --btn-bg:         #1A1A1A;
      --btn-text:       #FDFCFA;

      /* Fonts */
      --font-serif:     'EB Garamond', Georgia, serif;
      --font-sans:      'DM Sans', 'Helvetica Neue', sans-serif;

      /* Layout */
      --sidebar-width:  310px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-serif);
    }

    /* Cross-page transition: fade body in on load, fade out before nav */
    body {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    body.is-ready {
      opacity: 1;
    }


    /* ═══════════════════════════════════════════
       TOAST  (transient errors / confirmations)
       ═══════════════════════════════════════════ */

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background-color: var(--text);
      color: var(--btn-text);
      padding: 12px 22px;
      border-radius: 100px;
      font-family: var(--font-sans);
      font-size: 13px;
      letter-spacing: 0.02em;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 200;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.is-error {
      background-color: #B85C5C;
    }


    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }


    /* ═══════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════ */

    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }


    /* ═══════════════════════════════════════════
       HAMBURGER
       ═══════════════════════════════════════════ */

    .hamburger {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1100;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background-color: var(--text);
      border-radius: 2px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
    }

    /* Animated X state */
    .hamburger.is-open span:nth-child(1) {
      transform: rotate(45deg) translate(4.5px, 4.5px);
    }
    .hamburger.is-open span:nth-child(2) {
      transform: scaleX(0);
      opacity: 0;
    }
    .hamburger.is-open span:nth-child(3) {
      transform: rotate(-45deg) translate(4.5px, -4.5px);
    }


    /* ═══════════════════════════════════════════
       OVERLAY (mobile)
       ═══════════════════════════════════════════ */

    .overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.1);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }


    /* ═══════════════════════════════════════════
       SIDEBAR
       ═══════════════════════════════════════════ */

    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100vh;
      background-color: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      flex-shrink: 0;
    }

    .sidebar::-webkit-scrollbar       { width: 3px; }
    .sidebar::-webkit-scrollbar-track  { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb  { background: var(--sidebar-border); border-radius: 4px; }

    .sidebar__header {
      padding: 32px 28px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar__icon {
      font-size: 10px;
      color: var(--text-faint);
      line-height: 1;
    }

    .sidebar__title {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: var(--font-sans);
    }

    .sidebar__divider {
      height: 1px;
      background: linear-gradient(to right, var(--sidebar-border), transparent);
      margin: 12px 28px 8px;
    }

    .sidebar__list {
      padding: 8px 14px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }


    /* ═══════════════════════════════════════════
       ENTRY CARD
       ═══════════════════════════════════════════ */

    .entry-card {
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background-color: transparent;

      /* Mount animation */
      opacity: 0;
      transform: translateY(12px);
    }

    .entry-card.is-mounted {
      opacity: 1;
      transform: translateY(0);
    }

    .entry-card:hover {
      background-color: var(--card-hover);
    }

    .entry-card__top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      width: 100%;
    }

    .entry-card__mood {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .entry-card__date {
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--text-faint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .entry-card__title {
      font-size: 15.5px;
      font-weight: 500;
      margin-bottom: 3px;
      color: var(--text);
      line-height: 1.3;
    }

    .entry-card__preview {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      font-family: var(--font-sans);
    }

    .entry-card__draft-pill {
      display: inline-block;
      font-size: 9.5px;
      font-family: var(--font-sans);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background-color: var(--card-hover);
      border-radius: 4px;
      padding: 2px 7px;
      margin-left: auto;
    }

    .entry-card.is-draft .entry-card__title {
      font-style: italic;
      color: var(--text-mid);
    }

    .sidebar__empty {
      padding: 28px 28px;
      font-family: var(--font-sans);
      line-height: 1.55;
    }

    .sidebar__empty p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .sidebar__empty__sub {
      margin-top: 4px;
      color: var(--text-faint) !important;
      font-style: italic;
    }


    /* ═══════════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════════ */

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }


    /* ── Floating background shapes ── */

    .bg-shapes {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.5;
      filter: blur(80px);
    }

    .shape--1 { width: 320px; height: 320px; background: #EDE8DF; top: -5%;  right: 10%; animation: float1 22s ease-in-out infinite; }
    .shape--2 { width: 250px; height: 250px; background: #E8E3D8; bottom: 5%; left: 8%;   animation: float2 26s ease-in-out infinite; }
    .shape--3 { width: 180px; height: 180px; background: #F0E9DE; top: 40%;  right: 30%; animation: float3 20s ease-in-out infinite; }
    .shape--4 { width: 140px; height: 140px; background: #E5DFD4; top: 15%;  left: 25%;  animation: float4 24s ease-in-out infinite; }
    .shape--5 { width: 200px; height: 200px; background: #ECE7DD; bottom: 15%; right: 20%; animation: float5 28s ease-in-out infinite; }

    /* ── Floating motes (canvas) ── */

    .motes {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(30px, 40px) scale(1.05); }
      66%      { transform: translate(-20px, 20px) scale(0.95); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(-25px, -30px) scale(1.08); }
      66%      { transform: translate(35px, -15px) scale(0.96); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(40px, -35px) scale(1.1); }
    }
    @keyframes float4 {
      0%, 100% { transform: translate(0, 0); }
      33%      { transform: translate(20px, 25px); }
      66%      { transform: translate(-15px, -20px); }
    }
    @keyframes float5 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%      { transform: translate(-30px, 20px) scale(1.06); }
      70%      { transform: translate(15px, -25px) scale(0.97); }
    }


    /* ── Center content ── */

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 0 24px;
      max-width: 520px;

      /* Mount animation */
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .center.is-mounted {
      opacity: 1;
      transform: translateY(0);
    }

    .date-pill {
      font-size: 11px;
      font-family: var(--font-sans);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-faint);
      border: 1px solid var(--sidebar-border);
      border-radius: 100px;
      padding: 6px 18px;
      margin-bottom: 32px;
    }

    .greeting {
      font-size: 40px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 16px;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .greeting__name {
      font-style: italic;
      color: var(--text-mid);
    }

    .motivation {
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 48px;
      font-style: italic;
      max-width: 380px;
    }

    .new-entry-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 38px;
      font-size: 15px;
      font-family: var(--font-sans);
      font-weight: 500;
      letter-spacing: 0.04em;
      background-color: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    .new-entry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    }

    .new-entry-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .new-entry-btn__icon {
      font-size: 20px;
      font-weight: 300;
      line-height: 1;
    }

    .entry-count {
      font-size: 12px;
      font-family: var(--font-sans);
      color: var(--text-faint);
      letter-spacing: 0.04em;
    }


    /* ═══════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════ */

    /* Desktop */
    @media (min-width: 768px) {
      .hamburger { display: none; }
      .overlay   { display: none; }
    }

    /* Mobile */
    @media (max-width: 767px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1000;
        transform: translateX(-100%);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.06);
      }

      .sidebar.is-open {
        transform: translateX(0);
      }

      .main {
        width: 100%;
      }
    }

    /* Small phones */
    @media (max-width: 420px) {
      .greeting {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- ── Hamburger ── -->
    <button class="hamburger" id="hamburger" aria-label="Toggle past entries">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- ── Overlay ── -->
    <div class="overlay" id="overlay"></div>

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <span class="sidebar__icon">◆</span>
        <h2 class="sidebar__title">Past Entries</h2>
      </div>
      <div class="sidebar__divider"></div>
      <div class="sidebar__list" id="entry-list">
        <!-- Populated by JS -->
      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">

      <!-- Background shapes -->
      <div class="bg-shapes">
        <div class="shape shape--1"></div>
        <div class="shape shape--2"></div>
        <div class="shape shape--3"></div>
        <div class="shape shape--4"></div>
        <div class="shape shape--5"></div>
        <canvas class="motes" id="motes"></canvas>
      </div>

      <!-- Center content -->
      <div class="center" id="center">
        <div class="date-pill" id="date-pill"></div>
        <h1 class="greeting">Welcome back, <span class="greeting__name" id="user-name"></span></h1>
        <p class="motivation" id="motivation"></p>
        <button class="new-entry-btn" id="new-entry-btn">
          <span class="new-entry-btn__icon">+</span>
          <span>New Entry</span>
        </button>
        <p class="entry-count" id="entry-count"></p>
      </div>
    </main>
  </div>

  <!-- Toast for transient messages -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>


  <script>
    /* ═══════════════════════════════════════════
       DATA
       ═══════════════════════════════════════════ */

    const USER_NAME = "Jordan";

    const MESSAGES = [
      "Every day is a blank page waiting for your story.",
      "Your thoughts matter. Let them breathe here.",
      "A few words today, a treasure tomorrow.",
      "The quietest reflections often speak the loudest.",
      "You showed up for yourself today. That's enough.",
      "What's on your mind deserves space.",
      "Small moments, written down, become big memories.",
      "This is your corner of the world. Own it.",
      "Pause. Breathe. Write.",
      "Today is worth remembering.",
      "Let the ink carry what the mind holds.",
      "You're building something beautiful, one entry at a time.",
    ];

    const MOOD_COLORS = {
      peaceful:      "#8CBDB5",
      accomplished:  "#C4A265",
      reflective:    "#9B8EC4",
      grateful:      "#D4956B",
      introspective: "#7BA3C4",
    };


    /* ═══════════════════════════════════════════
       DOM REFS
       ═══════════════════════════════════════════ */

    const hamburger    = document.getElementById("hamburger");
    const overlay      = document.getElementById("overlay");
    const sidebar      = document.getElementById("sidebar");
    const entryList    = document.getElementById("entry-list");
    const center       = document.getElementById("center");
    const newEntryBtn  = document.getElementById("new-entry-btn");


    /* ═══════════════════════════════════════════
       POPULATE CONTENT
       ═══════════════════════════════════════════ */

    // User name
    document.getElementById("user-name").textContent = USER_NAME;

    // Date pill
    const today = new Date().toLocaleDateString("en-US", {
      weekday: "long",
      month: "long",
      day: "numeric",
    });
    document.getElementById("date-pill").textContent = today;

    // Random motivational message
    const randomMsg = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
    document.getElementById("motivation").textContent = `"${randomMsg}"`;


    /* ═══════════════════════════════════════════
       LOAD ENTRIES FROM SERVER
       ═══════════════════════════════════════════ */

    function formatEntryDate(ms) {
      return new Date(ms).toLocaleDateString("en-US", {
        month: "short",
        day:   "numeric",
        year:  "numeric",
      });
    }

    function entryPreview(body) {
      if (!body) return "—";
      const trimmed = body.trim().replace(/\s+/g, " ");
      if (trimmed.length === 0) return "—";
      return trimmed.length > 80 ? trimmed.slice(0, 80) + "…" : trimmed;
    }

    async function loadEntries() {
      let entries = [];
      try {
        const res = await fetch("/api/entries");
        if (!res.ok) throw new Error("Failed to fetch");
        entries = await res.json();
      } catch (err) {
        console.error("Could not load entries:", err);
        entryList.innerHTML = `
          <div class="sidebar__empty">
            <p>Couldn't reach the journal.</p>
            <p class="sidebar__empty__sub">Make sure the server is running.</p>
          </div>
        `;
        return;
      }

      // Count this month for the entry-count line (published only)
      const now = new Date();
      const monthCount = entries.filter((e) => {
        if (e.status !== "published") return false;
        const d = new Date(e.updatedAt);
        return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
      }).length;

      const label = monthCount === 1 ? "entry" : "entries";
      document.getElementById("entry-count").textContent =
        `${monthCount} ${label} this month`;

      // Render
      entryList.innerHTML = "";

      if (entries.length === 0) {
        entryList.innerHTML = `
          <div class="sidebar__empty">
            <p>Your journal is empty.</p>
            <p class="sidebar__empty__sub">Begin with whatever's on your mind.</p>
          </div>
        `;
        return;
      }

      entries.forEach((entry, i) => {
        const card = document.createElement("div");
        const isDraft = entry.status === "draft";
        card.className = "entry-card" + (isDraft ? " is-draft" : "");
        card.dataset.id = entry.id;
        card.style.transitionDelay = `${i * 60 + 150}ms`;

        const moodColor = entry.mood && MOOD_COLORS[entry.mood] ? MOOD_COLORS[entry.mood] : "#D4CFC4";
        const titleText = entry.title && entry.title.trim().length > 0
          ? entry.title
          : (isDraft ? "Untitled draft" : "Untitled");

        card.innerHTML = `
          <div class="entry-card__top">
            <span class="entry-card__mood" style="background-color: ${moodColor}"></span>
            <span class="entry-card__date">${formatEntryDate(entry.updatedAt)}</span>
            ${isDraft ? `<span class="entry-card__draft-pill">Draft</span>` : ""}
          </div>
          <h3 class="entry-card__title"></h3>
          <p class="entry-card__preview"></p>
        `;

        // Use textContent (set after innerHTML structure) to avoid HTML injection
        card.querySelector(".entry-card__title").textContent   = titleText;
        card.querySelector(".entry-card__preview").textContent = entryPreview(entry.body);

        // Click → open in editor (drafts editable, published read-only by default)
        card.addEventListener("click", () => {
          const params = new URLSearchParams({ id: entry.id });
          if (!isDraft) params.set("mode", "view");
          fadeOutAndGo("/editor.html?" + params.toString());
        });

        entryList.appendChild(card);

        // Trigger mount animation on next frame
        requestAnimationFrame(() => card.classList.add("is-mounted"));
      });
    }


    /* ═══════════════════════════════════════════
       NEW ENTRY
       ═══════════════════════════════════════════ */

    newEntryBtn.addEventListener("click", async () => {
      // Disable button to prevent double-clicks
      if (newEntryBtn.disabled) return;
      newEntryBtn.disabled = true;

      try {
        const res = await fetch("/api/entries", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: "", body: "", mood: null }),
        });
        if (!res.ok) throw new Error("Create failed");
        const entry = await res.json();
        fadeOutAndGo(`/editor.html?id=${encodeURIComponent(entry.id)}`);
      } catch (err) {
        console.error(err);
        showToast("Couldn't reach the server. Try again?", "error");
        newEntryBtn.disabled = false;
      }
    });


    /* ═══════════════════════════════════════════
       PAGE TRANSITIONS / TOAST
       ═══════════════════════════════════════════ */

    function fadeOutAndGo(url) {
      document.body.classList.remove("is-ready");
      setTimeout(() => { window.location.href = url; }, 350);
    }

    // If the user comes back via browser back-button (bfcache), the body
    // is still in the faded-out state — restore it.
    window.addEventListener("pageshow", (e) => {
      if (e.persisted) {
        document.body.classList.add("is-ready");
      }
    });

    let toastTimer = null;
    const toastEl = document.getElementById("toast");
    function showToast(message, kind = "") {
      toastEl.textContent = message;
      toastEl.className = "toast" + (kind ? " is-" + kind : "");
      requestAnimationFrame(() => toastEl.classList.add("is-visible"));
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove("is-visible"), 3200);
    }


    /* ═══════════════════════════════════════════
       SIDEBAR TOGGLE
       ═══════════════════════════════════════════ */

    function openSidebar() {
      hamburger.classList.add("is-open");
      overlay.classList.add("is-visible");
      sidebar.classList.add("is-open");
    }

    function closeSidebar() {
      hamburger.classList.remove("is-open");
      overlay.classList.remove("is-visible");
      sidebar.classList.remove("is-open");
    }

    hamburger.addEventListener("click", () => {
      sidebar.classList.contains("is-open") ? closeSidebar() : openSidebar();
    });

    overlay.addEventListener("click", closeSidebar);

    // Close on outside click
    document.addEventListener("mousedown", (e) => {
      if (
        sidebar.classList.contains("is-open") &&
        !sidebar.contains(e.target) &&
        !hamburger.contains(e.target)
      ) {
        closeSidebar();
      }
    });


    /* ═══════════════════════════════════════════
       MOUNT ANIMATIONS
       ═══════════════════════════════════════════ */

    requestAnimationFrame(() => {
      document.body.classList.add("is-ready");
      // Center content fade-in
      center.classList.add("is-mounted");
    });

    // Load entries from the server (cards mount themselves as they render)
    loadEntries();


    /* ═══════════════════════════════════════════
       KEYBOARD SHORTCUTS
       n           → New entry
       Cmd/Ctrl+N  → New entry
       ═══════════════════════════════════════════ */

    document.addEventListener("keydown", (e) => {
      // Don't intercept while typing in fields (none on home, but future-proof)
      const target = e.target;
      if (target && (target.tagName === "INPUT" || target.tagName === "TEXTAREA")) return;

      if (e.key === "n" && !e.metaKey && !e.ctrlKey && !e.altKey) {
        e.preventDefault();
        newEntryBtn.click();
      }
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "n") {
        e.preventDefault();
        newEntryBtn.click();
      }
    });


    /* ═══════════════════════════════════════════
       FLOATING MOTES (background atmosphere)
       ═══════════════════════════════════════════ */

    (() => {
      const canvas = document.getElementById("motes");
      const ctx    = canvas.getContext("2d");

      const MOTE_COUNT = 70;                       // 60–80 dots
      const COLORS     = ["200, 192, 176", "184, 176, 160"]; // #C8C0B0, #B8B0A0 as rgb tuples
      const dpr        = window.devicePixelRatio || 1;

      let width  = 0;
      let height = 0;
      let motes  = [];

      function resize() {
        const rect = canvas.getBoundingClientRect();
        width  = rect.width;
        height = rect.height;
        canvas.width  = width  * dpr;
        canvas.height = height * dpr;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
      }

      function makeMote(initialPlacement = false) {
        // 80–150s to cross the full screen height, in px/sec
        const traversalSeconds = 80 + Math.random() * 70;
        const speed            = height / traversalSeconds; // px per second, upward

        return {
          x:          Math.random() * width,
          // On first load: scatter across the whole height so the screen feels populated.
          // On reset: spawn just below the bottom edge.
          y:          initialPlacement ? Math.random() * height : height + Math.random() * 20,
          size:       1 + Math.random() * 2,                 // 1–3px
          opacity:    0.08 + Math.random() * 0.17,           // 0.08–0.25
          speed:      speed,
          color:      COLORS[Math.floor(Math.random() * COLORS.length)],
          swayAmp:    8 + Math.random() * 18,                // horizontal sway radius (px)
          swayFreq:   0.0003 + Math.random() * 0.0005,       // slow sine frequency
          swayPhase:  Math.random() * Math.PI * 2,
        };
      }

      function init() {
        resize();
        motes = Array.from({ length: MOTE_COUNT }, () => makeMote(true));
      }

      let lastTime = performance.now();

      function tick(now) {
        const dt = (now - lastTime) / 1000; // seconds since last frame
        lastTime = now;

        ctx.clearRect(0, 0, width, height);

        for (const m of motes) {
          // Drift upward
          m.y -= m.speed * dt;

          // Gentle sine-wave horizontal sway
          const drawX = m.x + Math.sin(now * m.swayFreq + m.swayPhase) * m.swayAmp;

          // Reset silently when the mote leaves the top
          if (m.y < -m.size) {
            const fresh = makeMote(false);
            Object.assign(m, fresh);
            continue;
          }

          ctx.beginPath();
          ctx.arc(drawX, m.y, m.size / 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${m.color}, ${m.opacity})`;
          ctx.fill();
        }

        requestAnimationFrame(tick);
      }

      // Re-fit canvas when the viewport changes; preserve mote positions proportionally
      window.addEventListener("resize", () => {
        const prevH = height;
        resize();
        if (prevH > 0) {
          const ratio = height / prevH;
          for (const m of motes) {
            m.x *= width / (canvas.width / dpr || width); // x scales with width
            m.y *= ratio;
            m.speed = height / (80 + Math.random() * 70);
          }
        }
      });

      init();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
