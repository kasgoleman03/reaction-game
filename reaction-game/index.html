<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflex — Reaction Timer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ==========================================================
         Design tokens — single source of truth for color, type, motion.
         ========================================================== */
      :root {
        --bg: #0a0a12;
        --surface: #13131f;
        --card: #1e1e2e;
        --border: #2a2a3d;
        --border-soft: #232334;
        --text: #e8e8f0;
        --text-dim: #8a8aa0;
        --text-mute: #5a5a75;

        --accent: #7f77dd;
        --success: #1d9e75;
        --warn: #ba7517;
        --danger: #a32d2d;

        --font-display: 'Inter', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, monospace;

        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);

        /* Single source of truth for the column width — target, panels,
           and stats all align to this so the eye reads one cohesive stack. */
        --col-width: min(560px, 88vw);

        /* Vertical rhythm tokens. clamp() gives proportional scaling
           between mobile and desktop without media-query cliffs. The
           middle value is `vh`-based so the rhythm tightens on short
           viewports (laptops) and breathes on tall ones (4K monitors). */
        --gap-box-panels: clamp(20px, 4vh, 44px);
        --gap-panels-hint: clamp(18px, 3.5vh, 36px);
        --gap-hint-stats: clamp(20px, 4vh, 44px);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-display);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #scene {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          transparent 0%,
          var(--bg) 85%
        );
      }

      .ui {
        position: relative;
        z-index: 10;
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      /* ----- HEADER ----- */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 28px 40px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        font-size: 14px;
      }
      .brand-mark {
        width: 10px;
        height: 10px;
        border-radius: 2px;
        background: var(--accent);
        box-shadow: 0 0 12px rgba(127, 119, 221, 0.6);
      }
      .header-meta {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-mute);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ----- STAGE ----- */
      /* Centered cluster — but the key-hint uses margin-top: auto to
         break out of the centered group and float to the bottom of the
         stage, giving it its own band of space above the stats. */
      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0 24px;
        min-height: 0;
      }

      /* ----- TARGET ----- */
      .target {
        width: var(--col-width);
        aspect-ratio: 1.6 / 1;
        /* clamp() keeps the box proportional to the viewport without
           a hard cliff. Caps at 42vh on tall screens, shrinks to 30vh
           on short ones so the panels and hint always have room. */
        max-height: clamp(220px, 42vh, 440px);
        border-radius: 20px;
        background: var(--card);
        border: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
        position: relative;
        overflow: hidden;
        transition:
          background-color 320ms var(--ease-out),
          border-color 320ms var(--ease-out),
          transform 200ms var(--ease-out),
          box-shadow 320ms var(--ease-out);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.03) inset,
          0 30px 80px -20px rgba(0, 0, 0, 0.6);
      }
      .target:hover {
        transform: translateY(-2px);
      }
      .target:active {
        transform: translateY(0);
      }

      .target[data-state='idle'] {
        background: var(--card);
        border-color: var(--border);
      }
      .target[data-state='waiting'] {
        background: #2a1f1f;
        border-color: #4a2a2a;
      }
      .target[data-state='stimulus'] {
        background: var(--success);
        border-color: #25c490;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.08) inset,
          0 0 80px 0 rgba(29, 158, 117, 0.5),
          0 30px 80px -20px rgba(0, 0, 0, 0.6);
      }
      .target[data-state='result'] {
        background: var(--card);
        border-color: var(--border);
      }
      .target[data-state='early'] {
        background: #2e1a1a;
        border-color: var(--danger);
      }

      /* ----- PANELS ----- */
      /* Centered vertically so content is anchored regardless of how
         many lines the active panel has. Margin uses the clamp() token
         so the gap scales with viewport height instead of being a
         fixed pixel value that looks wrong at the extremes. */
      .panels {
        position: relative;
        width: var(--col-width);
        height: 96px;
        margin-top: var(--gap-box-panels);
      }
      .panel {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms var(--ease-out);
      }
      .panel.active {
        opacity: 1;
      }

      /* Eyebrow label — small, uppercase, color-shifts with state. */
      .target-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--text-mute);
        margin-bottom: 14px;
        transition: color 320ms var(--ease-out);
      }
      .stage[data-state='waiting'] .target-label {
        color: #b86060;
      }
      .stage[data-state='stimulus'] .target-label {
        color: var(--success);
      }
      .stage[data-state='early'] .target-label {
        color: var(--danger);
      }

      .target-headline {
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 500;
        letter-spacing: -0.01em;
        color: var(--text);
        margin-bottom: 10px;
        transition: color 320ms var(--ease-out);
      }
      .stage[data-state='stimulus'] .target-headline {
        color: var(--success);
        font-weight: 600;
        letter-spacing: 0.06em;
      }

      .target-sub {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.04em;
      }

      /* Result panel — its three lines sit closer together so the
         number reads as the hero with grade + hint as supporting text.
         Without this the result panel felt vertically loose vs others. */
      .panel[data-panel='result'] {
        gap: 0;
      }
      .result-time {
        font-family: var(--font-mono);
        font-size: 38px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1;
        margin-bottom: 12px;
        transition: color 320ms var(--ease-out);
      }
      .result-time .unit {
        font-size: 0.42em;
        font-weight: 500;
        color: var(--text-mute);
        margin-left: 5px;
        letter-spacing: 0;
      }
      .result-time[data-grade='fast'] {
        color: var(--success);
      }
      .result-time[data-grade='average'] {
        color: var(--warn);
      }
      .result-time[data-grade='slow'] {
        color: var(--danger);
      }

      .result-grade {
        font-family: var(--font-display);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 10px;
      }

      @keyframes stimulus-pulse {
        0% {
          transform: scale(0.985);
        }
        60% {
          transform: scale(1.008);
        }
        100% {
          transform: scale(1);
        }
      }
      .target[data-state='stimulus'] {
        animation: stimulus-pulse 280ms var(--ease-out);
      }

      /* ----- INPUT HINT ----- */
      /* Anchored to the panels above with an explicit clamp-based gap
         instead of margin-top: auto. The previous "float to bottom of
         stage" approach made the hint→panel gap depend entirely on
         leftover viewport space, which got weird on tall screens.
         Now the hint is part of the centered cluster and the spacing
         stays proportional regardless of viewport height. */
      .input-hint {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.18em;
        color: var(--text-mute);
        text-transform: uppercase;
        pointer-events: none;
        margin-top: var(--gap-panels-hint);
        opacity: 0.7;
        /* Reserve a stable line of vertical space — keeps the cluster's
           centered position from jumping when the .desktop/.touch swap
           changes which child renders. */
        min-height: 1em;
        line-height: 1;
      }
      /* Two siblings inside the hint — one for keyboard, one for touch.
         Visibility is driven by pointer capability (not screen width)
         because a 1366px touchscreen laptop should show TAP, while
         a 1100px desktop window should show SPACE. */
      .input-hint .desktop {
        display: inline;
      }
      .input-hint .touch {
        display: none;
      }
      /* Coarse pointer = primary input is touch. This is the right
         signal for "show TAP", far better than width-based detection. */
      @media (hover: none) and (pointer: coarse) {
        .input-hint .desktop {
          display: none;
        }
        .input-hint .touch {
          display: inline;
        }
      }
      /* Tablet and smaller: hide the hint entirely. display: none
         removes it from the flex flow so the box + panels recenter
         cleanly with no leftover gap. Width threshold catches both
         portrait tablets and phones regardless of pointer type. */
      @media (max-width: 1024px) {
        .input-hint {
          display: none;
        }
      }
      kbd {
        font-family: var(--font-mono);
        font-size: 10px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 6px;
        margin: 0 2px;
        color: var(--text-dim);
      }

      /* ----- STATS ----- */
      /* Constrained to align with the column above. One unified panel
         with internal dividers instead of four floating cards — far
         more cohesive and stops the layout from "widening" at the bottom. */
      .stats-wrap {
        display: flex;
        justify-content: center;
        padding: 18px 24px 32px;
      }
      .stats {
        width: var(--col-width);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: rgba(19, 19, 31, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
      }
      .stat {
        padding: 16px 18px;
        position: relative;
      }
      /* Hairline dividers between stat cells. */
      .stat + .stat::before {
        content: '';
        position: absolute;
        left: 0;
        top: 18%;
        bottom: 18%;
        width: 1px;
        background: var(--border-soft);
      }
      .stat-label {
        font-family: var(--font-display);
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-mute);
        margin-bottom: 8px;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text);
        line-height: 1;
      }
      .stat-value .unit {
        font-size: 11px;
        color: var(--text-mute);
        font-weight: 500;
        margin-left: 3px;
      }
      .stat-value.empty {
        color: var(--text-mute);
      }

      .target-scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      /* ----- RESPONSIVE ----- */
      /* The clamp() vertical rhythm tokens handle most viewport scaling
         on their own, so we only need media queries for things that
         truly change at smaller sizes — header padding, stats grid,
         and the box's aspect ratio. Spacing tokens auto-adapt. */
      @media (max-width: 720px) {
        .header {
          padding: 20px 22px;
        }
        .stats-wrap {
          padding: 12px 18px 22px;
        }
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
        /* On the 2x2 stats grid: add a horizontal divider between rows
           and suppress the vertical divider on the cell that starts
           the second row. */
        .stat:nth-child(3),
        .stat:nth-child(4) {
          border-top: 1px solid var(--border-soft);
        }
        .stat:nth-child(3)::before {
          display: none;
        }
        .target {
          /* On phones, square aspect ratio reads better and the box
             can take a bit less of the viewport so panels and hint
             have room to breathe. */
          aspect-ratio: 1 / 1;
          max-height: clamp(200px, 38vh, 360px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .target[data-state='stimulus'] {
          animation: none;
        }
        .target {
          transition-duration: 100ms;
        }
        .panel {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>

    <div class="ui">
      <header class="header">
        <div class="brand">
          <span class="brand-mark"></span>
          <span>REFLEX</span>
        </div>
        <div class="header-meta" id="header-meta">REACTION TEST</div>
      </header>

      <main class="stage">
        <div
          class="target"
          id="target"
          data-state="idle"
          tabindex="0"
          role="button"
          aria-label="Reaction target"
        >
          <canvas
            class="target-scene"
            id="target-scene"
            aria-hidden="true"
          ></canvas>
        </div>

        <div class="panels">
          <div class="panel active" data-panel="idle">
            <div class="target-label">Ready</div>
            <div class="target-headline">Click to begin</div>
            <div class="target-sub">React the moment it turns green</div>
          </div>

          <div class="panel" data-panel="waiting">
            <div class="target-label">Hold</div>
            <div class="target-headline">Wait for green…</div>
            <div class="target-sub">Don't click yet</div>
          </div>

          <div class="panel" data-panel="stimulus">
            <div class="target-label">Now</div>
            <div class="target-headline">CLICK</div>
            <div class="target-sub">— or press space —</div>
          </div>

          <div class="panel" data-panel="result">
            <div class="result-time" id="result-time" data-grade="average">
              <span id="result-ms">0</span><span class="unit">ms</span>
            </div>
            <div class="result-grade" id="result-grade">—</div>
            <div class="target-sub">Click to try again</div>
          </div>

          <div class="panel" data-panel="early">
            <div class="target-label" style="color: var(--danger)">
              Too early
            </div>
            <div class="target-headline">Wait for the green</div>
            <div class="target-sub">Click to try again</div>
          </div>
        </div>

        <div class="input-hint">
          <span class="desktop"><kbd>SPACE</kbd> works too</span>
          <span class="touch">Tap anywhere to react</span>
        </div>
      </main>

      <div class="stats-wrap">
        <section class="stats" aria-label="Session statistics">
          <div class="stat">
            <div class="stat-label">Last</div>
            <div class="stat-value empty" id="stat-last">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Best</div>
            <div class="stat-value empty" id="stat-best">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Average</div>
            <div class="stat-value empty" id="stat-avg">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Attempts</div>
            <div class="stat-value" id="stat-count">0</div>
          </div>
        </section>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      const sharedState = {
        phase: 'idle',
        grade: null,
        stimulusAt: 0,
      };

      // === AMBIENT 3D LAYER ===
      (() => {
        const canvas = document.getElementById('scene');
        const renderer = new THREE.WebGLRenderer({
          canvas,
          antialias: true,
          alpha: true,
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        renderer.setClearColor(0x0a0a12, 1);

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x0a0a12, 8, 22);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100,
        );
        camera.position.set(0, 0, 10);

        scene.add(new THREE.AmbientLight(0x4a4a6a, 0.5));
        const directional = new THREE.DirectionalLight(0x8a82e8, 0.6);
        directional.position.set(4, 6, 4);
        scene.add(directional);

        const stateLight = new THREE.PointLight(0x7f77dd, 1.2, 30);
        stateLight.position.set(0, 0, 6);
        scene.add(stateLight);

        const PALETTE = {
          idle: {
            primary: 0x7f77dd,
            secondary: 0x4a4475,
            light: 0x7f77dd,
            intensity: 1.0,
            speed: 1.0,
          },
          waiting: {
            primary: 0x3a3556,
            secondary: 0x2a2540,
            light: 0x5a5575,
            intensity: 0.7,
            speed: 0.35,
          },
          stimulus: {
            primary: 0x1d9e75,
            secondary: 0x25c490,
            light: 0x25e0a0,
            intensity: 2.4,
            speed: 2.4,
          },
          result_fast: {
            primary: 0x1d9e75,
            secondary: 0x25c490,
            light: 0x1d9e75,
            intensity: 1.4,
            speed: 1.2,
          },
          result_average: {
            primary: 0xba7517,
            secondary: 0xd08a28,
            light: 0xba7517,
            intensity: 1.4,
            speed: 1.0,
          },
          result_slow: {
            primary: 0xa32d2d,
            secondary: 0xc04040,
            light: 0xa32d2d,
            intensity: 1.4,
            speed: 0.8,
          },
          early: {
            primary: 0xa32d2d,
            secondary: 0x602020,
            light: 0xa32d2d,
            intensity: 1.6,
            speed: 0.5,
          },
        };

        const paletteFor = (s) => {
          if (s.phase === 'result' && s.grade)
            return PALETTE['result_' + s.grade];
          return PALETTE[s.phase] || PALETTE.idle;
        };

        const SHAPES = [];
        const geometries = [
          new THREE.IcosahedronGeometry(0.9, 0),
          new THREE.OctahedronGeometry(1.0, 0),
          new THREE.TorusKnotGeometry(0.55, 0.18, 64, 8),
          new THREE.IcosahedronGeometry(0.7, 0),
          new THREE.OctahedronGeometry(0.85, 0),
        ];

        for (let i = 0; i < 9; i++) {
          const geo = geometries[i % geometries.length];
          const mat = new THREE.MeshStandardMaterial({
            color: 0x7f77dd,
            roughness: 0.35,
            metalness: 0.4,
            flatShading: true,
            transparent: true,
            opacity: 0.55,
          });
          const mesh = new THREE.Mesh(geo, mat);
          const angle = (i / 9) * Math.PI * 2 + Math.random() * 0.4;
          const radius = 5.5 + Math.random() * 2.2;
          mesh.position.set(
            Math.cos(angle) * radius,
            Math.sin(angle) * radius * 0.55 + (Math.random() - 0.5) * 1.5,
            -2 - Math.random() * 4,
          );
          mesh.rotation.set(
            Math.random() * Math.PI,
            Math.random() * Math.PI,
            0,
          );

          SHAPES.push({
            mesh,
            mat,
            basePos: mesh.position.clone(),
            driftSpeed: 0.2 + Math.random() * 0.4,
            driftPhase: Math.random() * Math.PI * 2,
            rotSpeed: new THREE.Vector3(
              (Math.random() - 0.5) * 0.4,
              (Math.random() - 0.5) * 0.4,
              (Math.random() - 0.5) * 0.2,
            ),
          });
          scene.add(mesh);
        }

        const current = {
          primary: new THREE.Color(0x7f77dd),
          secondary: new THREE.Color(0x4a4475),
          light: new THREE.Color(0x7f77dd),
          intensity: 1.0,
          speed: 1.0,
          burst: 0,
        };
        const tmpColor = new THREE.Color();
        const lerp = (a, b, t) => a + (b - a) * t;
        const clock = new THREE.Clock();

        function animate() {
          requestAnimationFrame(animate);
          const dt = Math.min(clock.getDelta(), 0.05);
          const t = clock.elapsedTime;

          const target = paletteFor(sharedState);
          const k = 1 - Math.pow(0.001, dt);
          tmpColor.setHex(target.primary);
          current.primary.lerp(tmpColor, k);
          tmpColor.setHex(target.secondary);
          current.secondary.lerp(tmpColor, k);
          tmpColor.setHex(target.light);
          current.light.lerp(tmpColor, k);
          current.intensity = lerp(current.intensity, target.intensity, k);
          current.speed = lerp(current.speed, target.speed, k);

          const sinceStimulus =
            (performance.now() - sharedState.stimulusAt) / 1000;
          const burstTarget =
            sharedState.phase === 'stimulus' && sinceStimulus < 0.6
              ? Math.max(0, 1 - sinceStimulus / 0.6)
              : 0;
          current.burst = lerp(
            current.burst,
            burstTarget,
            1 - Math.pow(0.0001, dt),
          );

          stateLight.color.copy(current.light);
          stateLight.intensity = current.intensity + current.burst * 1.5;

          SHAPES.forEach((s, i) => {
            const useSecondary = i % 2 === 1;
            s.mat.color.copy(
              useSecondary ? current.secondary : current.primary,
            );
            s.mat.opacity = 0.45 + current.burst * 0.3;

            s.mesh.rotation.x += s.rotSpeed.x * dt * current.speed;
            s.mesh.rotation.y += s.rotSpeed.y * dt * current.speed;
            s.mesh.rotation.z += s.rotSpeed.z * dt * current.speed;

            const drift = Math.sin(t * s.driftSpeed + s.driftPhase) * 0.4;
            s.mesh.position.x = s.basePos.x + Math.cos(t * 0.3 + i) * 0.3;
            s.mesh.position.y = s.basePos.y + drift;

            if (current.burst > 0.01) {
              const dir = s.basePos.clone().normalize();
              s.mesh.position.addScaledVector(dir, current.burst * 0.6);
            }
          });

          renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight, false);
        });

        animate();
      })();

      // === TARGET 3D SHAPE ===
      (() => {
        const canvas = document.getElementById('target-scene');
        const renderer = new THREE.WebGLRenderer({
          canvas,
          antialias: true,
          alpha: true,
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 50);
        camera.position.set(0, 0, 5);

        scene.add(new THREE.AmbientLight(0x6a6a85, 0.6));
        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(2, 3, 4);
        scene.add(key);
        const rim = new THREE.PointLight(0x7f77dd, 1.4, 12);
        rim.position.set(-2, -1, 3);
        scene.add(rim);

        const coreGeo = new THREE.IcosahedronGeometry(1.0, 0);
        const coreMat = new THREE.MeshStandardMaterial({
          color: 0x7f77dd,
          roughness: 0.25,
          metalness: 0.55,
          flatShading: true,
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        const shellGeo = new THREE.IcosahedronGeometry(1.35, 1);
        const shellMat = new THREE.MeshBasicMaterial({
          color: 0x7f77dd,
          wireframe: true,
          transparent: true,
          opacity: 0.35,
        });
        const shell = new THREE.Mesh(shellGeo, shellMat);
        scene.add(shell);

        const PALETTE = {
          idle: {
            core: 0x7f77dd,
            shell: 0x7f77dd,
            light: 0x7f77dd,
            intensity: 1.4,
            speed: 1.0,
            scale: 1.0,
          },
          waiting: {
            core: 0x4a4060,
            shell: 0x6a5a85,
            light: 0x5a5075,
            intensity: 0.9,
            speed: 0.25,
            scale: 0.92,
          },
          stimulus: {
            core: 0x25e0a0,
            shell: 0x1d9e75,
            light: 0x25e0a0,
            intensity: 3.0,
            speed: 3.5,
            scale: 1.18,
          },
          result_fast: {
            core: 0x1d9e75,
            shell: 0x25c490,
            light: 0x1d9e75,
            intensity: 1.8,
            speed: 1.4,
            scale: 1.05,
          },
          result_average: {
            core: 0xba7517,
            shell: 0xd08a28,
            light: 0xba7517,
            intensity: 1.6,
            speed: 1.0,
            scale: 1.0,
          },
          result_slow: {
            core: 0xa32d2d,
            shell: 0xc04040,
            light: 0xa32d2d,
            intensity: 1.5,
            speed: 0.7,
            scale: 0.95,
          },
          early: {
            core: 0xa32d2d,
            shell: 0xc04040,
            light: 0xa32d2d,
            intensity: 1.8,
            speed: 0.4,
            scale: 0.9,
          },
        };

        const paletteFor = (s) => {
          if (s.phase === 'result' && s.grade)
            return PALETTE['result_' + s.grade];
          return PALETTE[s.phase] || PALETTE.idle;
        };

        const current = {
          core: new THREE.Color(0x7f77dd),
          shell: new THREE.Color(0x7f77dd),
          light: new THREE.Color(0x7f77dd),
          intensity: 1.4,
          speed: 1.0,
          scale: 1.0,
          burst: 0,
        };
        const tmpColor = new THREE.Color();
        const lerp = (a, b, t) => a + (b - a) * t;

        function resize() {
          const rect = canvas.getBoundingClientRect();
          if (rect.width === 0 || rect.height === 0) return;
          renderer.setSize(rect.width, rect.height, false);
          camera.aspect = rect.width / rect.height;
          camera.updateProjectionMatrix();
        }
        if (typeof ResizeObserver !== 'undefined') {
          new ResizeObserver(resize).observe(canvas);
        }
        window.addEventListener('resize', resize);
        resize();

        const clock = new THREE.Clock();

        function animate() {
          requestAnimationFrame(animate);
          const dt = Math.min(clock.getDelta(), 0.05);

          const target = paletteFor(sharedState);
          const k = 1 - Math.pow(0.001, dt);

          tmpColor.setHex(target.core);
          current.core.lerp(tmpColor, k);
          tmpColor.setHex(target.shell);
          current.shell.lerp(tmpColor, k);
          tmpColor.setHex(target.light);
          current.light.lerp(tmpColor, k);
          current.intensity = lerp(current.intensity, target.intensity, k);
          current.speed = lerp(current.speed, target.speed, k);
          current.scale = lerp(current.scale, target.scale, k);

          const sinceStimulus =
            (performance.now() - sharedState.stimulusAt) / 1000;
          const burstTarget =
            sharedState.phase === 'stimulus' && sinceStimulus < 0.5
              ? Math.max(0, 1 - sinceStimulus / 0.5)
              : 0;
          current.burst = lerp(
            current.burst,
            burstTarget,
            1 - Math.pow(0.0001, dt),
          );

          coreMat.color.copy(current.core);
          coreMat.emissive
            .copy(current.core)
            .multiplyScalar(current.burst * 0.6);
          shellMat.color.copy(current.shell);
          shellMat.opacity = 0.3 + current.burst * 0.4;
          rim.color.copy(current.light);
          rim.intensity = current.intensity + current.burst * 1.5;

          core.rotation.x += dt * 0.5 * current.speed;
          core.rotation.y += dt * 0.7 * current.speed;
          shell.rotation.x -= dt * 0.3 * current.speed;
          shell.rotation.y -= dt * 0.4 * current.speed;
          shell.rotation.z += dt * 0.2 * current.speed;

          const scale = current.scale + current.burst * 0.18;
          core.scale.setScalar(scale);
          shell.scale.setScalar(scale);

          renderer.render(scene, camera);
        }
        animate();
      })();

      // === GAME LOGIC ===
      (() => {
        const stage = document.querySelector('.stage');
        const target = document.getElementById('target');
        const panels = document
          .querySelector('.panels')
          .querySelectorAll('.panel');
        const resultMs = document.getElementById('result-ms');
        const resultTime = document.getElementById('result-time');
        const resultGrade = document.getElementById('result-grade');
        const headerMeta = document.getElementById('header-meta');

        const elLast = document.getElementById('stat-last');
        const elBest = document.getElementById('stat-best');
        const elAvg = document.getElementById('stat-avg');
        const elCount = document.getElementById('stat-count');

        const session = { times: [], best: null };
        let stimulusTime = 0;
        let waitTimeoutId = null;

        function showPanel(phase) {
          panels.forEach((p) => {
            p.classList.toggle('active', p.dataset.panel === phase);
          });
        }

        function gradeFor(ms) {
          if (ms < 250) return 'fast';
          if (ms <= 450) return 'average';
          return 'slow';
        }

        function gradeLabel(g) {
          return g === 'fast'
            ? 'Excellent reflex'
            : g === 'average'
              ? 'Solid response'
              : 'Room to improve';
        }

        const fmt = (ms) => Math.round(ms).toString();

        function updateStats() {
          if (!session.times.length) {
            elLast.textContent = '—';
            elLast.classList.add('empty');
            elBest.textContent = '—';
            elBest.classList.add('empty');
            elAvg.textContent = '—';
            elAvg.classList.add('empty');
            elCount.textContent = '0';
            return;
          }
          const last = session.times[session.times.length - 1];
          const avg =
            session.times.reduce((a, b) => a + b, 0) / session.times.length;

          elLast.innerHTML = `${fmt(last)}<span class="unit">ms</span>`;
          elLast.classList.remove('empty');
          elBest.innerHTML = `${fmt(session.best)}<span class="unit">ms</span>`;
          elBest.classList.remove('empty');
          elAvg.innerHTML = `${fmt(avg)}<span class="unit">ms</span>`;
          elAvg.classList.remove('empty');
          elCount.textContent = session.times.length.toString();
        }

        function setPhase(phase, payload = {}) {
          sharedState.phase = phase;
          sharedState.grade = phase === 'result' ? payload.grade : null;
          target.dataset.state = phase;
          stage.dataset.state = phase;
          showPanel(phase);

          if (waitTimeoutId !== null) {
            clearTimeout(waitTimeoutId);
            waitTimeoutId = null;
          }

          if (phase === 'idle') {
            headerMeta.textContent = 'REACTION TEST';
          }

          if (phase === 'waiting') {
            headerMeta.textContent = 'HOLD…';
            const delay = 1500 + Math.random() * 2500;
            waitTimeoutId = setTimeout(() => {
              if (sharedState.phase === 'waiting') {
                setPhase('stimulus');
              }
            }, delay);
          }

          if (phase === 'stimulus') {
            headerMeta.textContent = 'NOW';
            stimulusTime = performance.now();
            sharedState.stimulusAt = stimulusTime;
          }

          if (phase === 'result') {
            headerMeta.textContent = `${fmt(payload.ms)}MS`;
            resultMs.textContent = fmt(payload.ms);
            resultTime.dataset.grade = payload.grade;
            resultGrade.textContent = gradeLabel(payload.grade);
          }

          if (phase === 'early') {
            headerMeta.textContent = 'TOO EARLY';
          }
        }

        function handleResponse(e) {
          if (e) e.preventDefault();
          const now = performance.now();

          switch (sharedState.phase) {
            case 'idle':
              setPhase('waiting');
              break;
            case 'waiting':
              setPhase('early');
              break;
            case 'stimulus': {
              const ms = now - stimulusTime;
              session.times.push(ms);
              if (session.best === null || ms < session.best) session.best = ms;
              updateStats();
              setPhase('result', { ms, grade: gradeFor(ms) });
              break;
            }
            case 'result':
            case 'early':
              setPhase('waiting');
              break;
          }
        }

        target.addEventListener('click', handleResponse);
        window.addEventListener('keydown', (e) => {
          if (e.code === 'Space' || e.key === ' ') {
            // Don't hijack space when an input/textarea/contenteditable is focused.
            const t = e.target;
            if (
              t &&
              (t.tagName === 'INPUT' ||
                t.tagName === 'TEXTAREA' ||
                t.isContentEditable)
            )
              return;
            handleResponse(e);
          }
        });

        setPhase('idle');
        updateStats();
      })();
    </script>
  </body>
</html>
